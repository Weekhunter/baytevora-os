set timeout=5
set default=0
set gfxpayload=keep

menuentry "Baytevora OS 0.1 Alpha" {
    linux /boot/vmlinuz quiet splash root=/dev/ram0 init=/opt/baytevora/iso/scripts/live-init
    initrd /boot/initramfs.img
}

