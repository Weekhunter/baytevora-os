[Autologin]
User=live
Session=Baytevora.desktop
Relogin=false

[General]
# X11 backend is used by default because it is available on every Debian
# install. The Baytevora session launcher will still prefer Wayland when a
# Wayland compositor is present.
DisplayServer=x11

[Theme]
# Placeholder for a future Baytevora SDDM theme.
Current=breeze
